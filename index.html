<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GA DASHBOARD - LG.COM Lineup Guide / Feature Library</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
/* =========== DARK THEME (default) =========== */
:root, [data-theme="dark"] {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22222e;
  --border: #2a2a3a;
  --text: #e4e4ef;
  --text2: #8888a0;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --orange: #f97316;
  --chart-grid: rgba(42,42,58,0.5);
  --chart-text: #8888a0;
  --hover-row: rgba(99,102,241,0.03);
}

/* =========== LIGHT THEME =========== */
[data-theme="light"] {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f0f0f3;
  --border: #e0e0e6;
  --text: #1a1a2e;
  --text2: #6b6b80;
  --accent: #4f46e5;
  --accent2: #6366f1;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #ca8a04;
  --orange: #ea580c;
  --chart-grid: rgba(0,0,0,0.06);
  --chart-text: #6b6b80;
  --hover-row: rgba(79,70,229,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 8px;
}

.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent2); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-actions .last-updated {
  font-size: 12px;
  color: var(--text2);
  margin-right: 4px;
}

/* Toggle pill buttons */
.toggle-group {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.toggle-group button {
  padding: 5px 12px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.toggle-group button.active {
  background: var(--accent);
  color: #fff;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-outline:hover { border-color: var(--accent); color: var(--accent2); }
.btn-outline.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

.filters { display: grid; gap: 10px; margin-bottom: 24px; }
.filter-level {
  display: grid;
  gap: 8px;
}
.filter-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text2);
}
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.top-nav-row {
  display: flex;
  align-items: stretch;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.month-picker {
  position: relative;
  min-width: 0;
}

.month-picker-trigger {
  width: auto;
  display: inline-flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  height: 44px;
  padding: 0 18px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: rgba(90, 134, 234, 0.04);
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  box-shadow: none;
}

.month-picker-trigger .month-trigger-main {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.month-picker-trigger .month-trigger-copy {
  display: inline-flex;
  align-items: center;
}

.month-picker-trigger .month-trigger-value {
  font-size: 13px;
  line-height: 1;
  color: currentColor;
}

.month-picker-trigger .caret {
  color: var(--text2);
  transition: transform .2s ease;
  display: inline-flex;
  align-items: center;
}

.month-picker.open .month-picker-trigger .caret {
  transform: rotate(180deg);
}

.month-picker-trigger:hover {
  background: rgba(90, 134, 234, 0.08);
  color: var(--text);
}

.month-picker-menu {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
  display: none;
  z-index: 120;
}

.month-picker.open .month-picker-menu {
  display: block;
}

.month-picker-option {
  width: 100%;
  border: none;
  background: transparent;
  color: var(--text);
  padding: 10px 12px;
  border-radius: 10px;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
}

.month-picker-option:hover,
.month-picker-option.active {
  background: rgba(99, 102, 241, 0.08);
  color: var(--accent2);
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card {
  position: relative;
  background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px 16px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, rgba(56,189,248,0.95), rgba(124,181,255,0.12));
}
.kpi-card.down::before { background: linear-gradient(90deg, rgba(239,68,68,0.95), rgba(239,68,68,0.10)); }
.kpi-card.neutral::before { background: linear-gradient(90deg, rgba(148,163,184,0.9), rgba(148,163,184,0.10)); }
.kpi-card .kpi-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; font-weight: 700; }
.kpi-card .kpi-sub-label { font-size: 11px; color: var(--text2); margin-bottom: 14px; font-weight: 600; }
.kpi-card .kpi-value { font-size: 34px; font-weight: 800; letter-spacing: -0.03em; }
.kpi-card .kpi-change { font-size: 12px; margin-top: 10px; }
.kpi-card .kpi-note { margin-top: 10px; font-size: 12px; color: var(--text2); font-weight: 600; }
.kpi-card .kpi-status-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 42px;
  height: 24px;
  padding: 0 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.01em;
  border: 1px solid transparent;
}
.kpi-card .kpi-status-badge.up { background: rgba(34,197,94,0.10); border-color: rgba(34,197,94,0.24); color: var(--green); }
.kpi-card .kpi-status-badge.down { background: rgba(234,179,8,0.10); border-color: rgba(234,179,8,0.24); color: var(--yellow); }
.kpi-card .kpi-status-badge.neutral { background: rgba(148,163,184,0.10); border-color: rgba(148,163,184,0.18); color: #cbd5e1; }
.kpi-change.up { color: var(--green); }
.kpi-change.down { color: var(--red); }
.kpi-change.neutral { color: var(--text2); }

.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.section-title .badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: rgba(99,102,241,0.15); color: var(--accent2);
}

.charts-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 16px; margin-bottom: 32px;
}

@media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; transition: background 0.2s;
}

.chart-card h3 { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 12px; }
.chart-card canvas { max-height: 280px; }

.insights-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 16px; margin-bottom: 32px;
}

.insight-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; border-left: 3px solid;
}

.insight-card.warning { border-left-color: var(--yellow); }
.insight-card.success { border-left-color: var(--green); }
.insight-card.traffic { border-left-color: var(--accent); }
.insight-card.info { border-left-color: var(--text2); }

.insight-card .insight-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

.insight-card .priority-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; text-transform: uppercase;
}

.priority-badge.high { background: rgba(239,68,68,0.2); color: var(--red); }
.priority-badge.medium { background: rgba(234,179,8,0.2); color: var(--yellow); }

.insight-card .insight-page { font-size: 12px; font-weight: 600; color: var(--accent2); }
.insight-card .insight-text { font-size: 13px; color: var(--text); line-height: 1.6; }

.action-items {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 32px;
}

.action-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.action-item:last-child { border-bottom: none; }

.action-item .action-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; font-weight: 700;
}

.action-icon.urgent { background: rgba(239,68,68,0.15); color: var(--red); }
.action-icon.improve { background: rgba(234,179,8,0.15); color: var(--yellow); }
.action-icon.monitor { background: rgba(99,102,241,0.15); color: var(--accent2); }

.action-item .action-text { font-size: 13px; color: var(--text); }
.action-item .action-text strong { color: var(--accent2); }

.status-table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow-x: auto; margin-bottom: 32px;
}

.status-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.status-table th {
  background: var(--surface2); padding: 10px 14px; text-align: left;
  font-weight: 500; color: var(--text2); border-bottom: 1px solid var(--border);
}

.status-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.status-table tr:last-child td { border-bottom: none; }
.status-table tr:hover { background: var(--hover-row); }

.status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.status-badge.live { background: rgba(34,197,94,0.15); color: var(--green); }
.status-badge.pending { background: rgba(234,179,8,0.15); color: var(--yellow); }
.status-badge.none { background: rgba(136,136,160,0.1); color: var(--text2); }

.comparison-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.comparison-table th {
  background: var(--surface2); padding: 10px 14px; text-align: right;
  font-weight: 500; color: var(--text2); border-bottom: 1px solid var(--border);
}

.comparison-table th:first-child { text-align: left; }

.comparison-table td {
  padding: 10px 14px; text-align: right;
  border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums;
}

.comparison-table td:first-child { text-align: left; font-weight: 500; }

.tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: var(--surface); border-radius: 10px; padding: 4px;
  width: fit-content; flex-wrap: wrap;
}

.tab {
  padding: 8px 16px; border-radius: 8px; border: none;
  background: transparent; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}

.tab.active { background: var(--accent); color: white; }
.tab:hover:not(.active) { color: var(--text); }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px; font-size: 13px;
  z-index: 200; opacity: 0; transform: translateY(10px); transition: all 0.3s;
}

.toast.show { opacity: 1; transform: translateY(0); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Expert Analysis Styles */
.exec-summary {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 24px;
  border-left: 4px solid var(--accent);
}
.exec-summary h3 { font-size: 16px; margin-bottom: 12px; color: var(--accent2); }
.exec-summary p { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 8px; }

.country-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
}
.country-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.country-card-header h3 { font-size: 16px; font-weight: 600; }
.status-pill {
  padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  text-transform: uppercase;
}
.status-pill.growing { background: rgba(34,197,94,0.15); color: var(--green); }
.status-pill.stable { background: rgba(99,102,241,0.15); color: var(--accent2); }
.status-pill.declining { background: rgba(239,68,68,0.15); color: var(--red); }

.country-metrics {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.country-metric { text-align: center; }
.country-metric .cm-value { font-size: 20px; font-weight: 700; }
.country-metric .cm-label { font-size: 11px; color: var(--text2); }

.link-chips {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.link-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 6px; font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--accent2); text-decoration: none; transition: all 0.15s;
}
.link-chip:hover { border-color: var(--accent); background: rgba(99,102,241,0.1); }
.link-chip.live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.link-chip.pending::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); }
.link-chip.offline::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text2); }

.analyst-note {
  background: var(--surface2); border-radius: 8px; padding: 12px 16px;
  font-size: 13px; line-height: 1.7; color: var(--text); margin-top: 8px;
  border-left: 2px solid var(--accent2);
}
.analyst-note strong { color: var(--accent2); }

.todo-list { list-style: none; }
.todo-list li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-size: 13px; line-height: 1.6;
}
.todo-list li:last-child { border-bottom: none; }
.todo-icon {
  width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; margin-top: 2px;
}
.todo-icon.red { background: rgba(239,68,68,0.15); color: var(--red); }
.todo-icon.yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.todo-icon.blue { background: rgba(99,102,241,0.15); color: var(--accent2); }
.todo-icon.green { background: rgba(34,197,94,0.15); color: var(--green); }

.direction-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
  border-left: 4px solid var(--green);
}
.direction-card h4 { font-size: 14px; color: var(--green); margin-bottom: 8px; }
.direction-card p { font-size: 13px; line-height: 1.7; }

.sub-tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.sub-tab {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.sub-tab.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }

.ranking-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
.ranking-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
.ranking-table td:first-child { font-weight: 600; color: var(--accent2); width: 30px; }
.ranking-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
.ranking-table tr.is-selected-country { background: rgba(124,181,255,0.08); }

/* Main page insight summary */
.main-insight-hero {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 20px;
  border-left: 4px solid var(--accent);
}
.main-insight-hero h2 { font-size: 17px; margin-bottom: 14px; color: var(--accent2); }
.main-insight-kpis {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.main-insight-kpi { text-align: center; }
.main-insight-kpi .mik-value { font-size: 22px; font-weight: 700; }
.main-insight-kpi .mik-label { font-size: 11px; color: var(--text2); }

.main-actions-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 20px;
}
.main-actions-wrap h3 { font-size: 15px; margin-bottom: 12px; color: var(--text); }
.main-action-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
  cursor: pointer; transition: background 0.15s;
  font-size: 13px; line-height: 1.6;
}
.main-action-row:hover { background: var(--surface2); }
.main-action-row .todo-icon { flex-shrink: 0; }
.main-action-row .action-detail-link {
  margin-left: auto; flex-shrink: 0; font-size: 11px;
  color: var(--accent2); opacity: 0.6; transition: opacity 0.15s;
  white-space: nowrap; padding-left: 8px;
}
.main-action-row:hover .action-detail-link { opacity: 1; }

.view-all-link {
  display: inline-block; margin-top: 8px; font-size: 12px;
  color: var(--accent2); cursor: pointer; text-decoration: none;
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  transition: all 0.15s;
}
.view-all-link:hover { border-color: var(--accent); background: rgba(99,102,241,0.1); }

/* Country status mini cards on main page */
.country-status-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px; margin-top: 12px;
}
.country-status-mini {
  padding: 8px 12px; border-radius: 8px;
  background: var(--surface2); cursor: pointer;
  transition: all 0.15s; border: 1px solid transparent;
  font-size: 12px;
}
.country-status-mini:hover { border-color: var(--accent); }
.country-status-mini .csm-name { font-weight: 600; margin-bottom: 2px; }
.country-status-mini .csm-stat { color: var(--text2); font-size: 11px; }

/* Detail data section */
.detail-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 40px 0 20px; padding-top: 24px;
  border-top: 2px solid var(--border);
}
.detail-divider span {
  font-size: 13px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
}
.detail-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.detail-tabs {
  display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap;
}
.detail-tab {
  padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.detail-tab.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }
.detail-tab:hover:not(.active) { color: var(--text); border-color: var(--text2); }
.detail-content { display: none; }
.detail-content.active { display: block; }

/* Scroll-to-detail link */
.scroll-to-detail {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--accent2); cursor: pointer;
  opacity: 0.7; transition: opacity 0.15s; text-decoration: none;
}
.scroll-to-detail:hover { opacity: 1; text-decoration: underline; }

/* Page Links Drawer */
.links-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.links-overlay.open { opacity: 1; pointer-events: auto; }
.links-drawer {
  position: fixed; top: 0; right: -400px; width: 380px; max-width: 90vw;
  height: 100vh; background: var(--surface); border-left: 1px solid var(--border);
  z-index: 301; display: flex; flex-direction: column;
  transition: right 0.3s ease;
  box-shadow: -4px 0 24px rgba(0,0,0,0.2);
}
.links-drawer.open { right: 0; }
.links-drawer-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.links-drawer-header h3 { font-size: 15px; white-space: nowrap; }
.links-search {
  flex: 1; padding: 6px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 12px; outline: none;
}
.links-search:focus { border-color: var(--accent); }
.links-close {
  background: none; border: none; color: var(--text2);
  font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1;
}
.links-close:hover { color: var(--text); }
.links-drawer-body {
  flex: 1; overflow-y: auto; padding: 12px 16px;
}
.links-country-group { margin-bottom: 16px; }
.links-country-label {
  font-size: 12px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.links-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 6px;
  text-decoration: none; color: var(--text);
  font-size: 13px; transition: background 0.12s;
}
.links-item:hover { background: var(--surface2); }
.links-item .li-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.links-item .li-dot.live { background: var(--green); }
.links-item .li-dot.pending { background: var(--yellow); }
.links-item .li-dot.offline { background: var(--text2); }
.links-item .li-type {
  font-size: 11px; color: var(--text2); margin-left: auto; white-space: nowrap;
}

/* =========== Intelligence Brief =========== */
.intel-brief {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.intel-brief::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--green), var(--orange));
}
.intel-brief-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.intel-brief-header h2 { font-size: 17px; font-weight: 700; }
.intel-brief-header .ai-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(34,197,94,0.2));
  color: var(--accent2); font-weight: 600; letter-spacing: 0.5px;
}
.intel-brief-actions { display: flex; gap: 6px; }
.brief-item {
  padding: 14px 16px; border-radius: 10px; margin-bottom: 10px;
  background: var(--surface2); border-left: 4px solid;
  transition: all 0.2s;
}
.brief-item:hover { transform: translateX(2px); }
.brief-item.alert { border-left-color: var(--red); }
.brief-item.watch { border-left-color: var(--yellow); }
.brief-item.good { border-left-color: var(--green); }
.brief-item .brief-signal {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 1px 8px; border-radius: 4px; margin-right: 8px;
  vertical-align: middle;
}
.brief-item.alert .brief-signal { background: rgba(239,68,68,0.15); color: var(--red); }
.brief-item.watch .brief-signal { background: rgba(234,179,8,0.15); color: var(--yellow); }
.brief-item.good .brief-signal { background: rgba(34,197,94,0.15); color: var(--green); }
.brief-item .brief-text { font-size: 13px; line-height: 1.7; }
.brief-item .brief-detail {
  display: none; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border); font-size: 12px; color: var(--text2);
}
.brief-item .brief-detail.open { display: block; }
.brief-item .see-data-btn {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 8px; font-size: 11px; color: var(--accent2);
  cursor: pointer; background: none; border: none;
  transition: opacity 0.15s; opacity: 0.7;
}
.brief-item .see-data-btn:hover { opacity: 1; }
.brief-skeleton {
  animation: pulse 1.5s ease-in-out infinite;
}
.brief-skeleton .skel-line {
  height: 14px; border-radius: 4px; background: var(--surface2); margin-bottom: 10px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.brief-no-key {
  text-align: center; padding: 24px; color: var(--text2); font-size: 13px;
}
.brief-no-key .setup-link {
  color: var(--accent2); cursor: pointer; text-decoration: underline;
}

/* =========== Signal Cards =========== */
.signal-cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.signal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 22px 22px 18px; cursor: pointer;
  transition: all 0.2s; border-left: 0;
  box-shadow: var(--shadow-card);
}
.signal-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(23,32,51,0.08); }
.signal-card.sig-red { border-color: rgba(239,68,68,0.2); }
.signal-card.sig-yellow { border-color: rgba(234,179,8,0.2); }
.signal-card.sig-green { border-color: rgba(34,197,94,0.2); }
.signal-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; gap: 12px; }
.signal-card-top h3 { font-size: 15px; font-weight: 700; display:inline-flex; align-items:flex-start; gap:10px; }
.signal-badge {
  font-size: 10px; padding: 6px 12px; border-radius: 14px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 6px;
}
.signal-badge.sig-red { background: rgba(239,68,68,0.12); color: var(--red); }
.signal-badge.sig-yellow { background: rgba(234,179,8,0.12); color: var(--yellow); }
.signal-badge.sig-green { background: rgba(34,197,94,0.12); color: var(--green); }
.signal-badge .ui-icon { width: 14px; height: 14px; }
.signal-card-metrics {
  display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px 28px; margin-bottom: 12px;
}
.signal-card-metric { text-align: left; }
.signal-card-metrics .scm-val { font-size: 24px; font-weight: 700; letter-spacing:-0.03em; }
.signal-card-metrics .scm-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; display:inline-flex; align-items:center; gap:6px; margin-bottom: 8px; }
.signal-card-metrics .scm-label .ui-icon { width:14px; height:14px; }
.signal-card-metrics .scm-delta { font-size: 11px; margin-top: 6px; }
.signal-card-note {
  font-size: 12px; color: var(--text2); font-style: normal;
  padding: 10px 12px; background: var(--surface2); border-radius: 12px;
  border: 1px solid var(--border);
}
.signal-card-expanded {
  display: none; margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.signal-card.open .signal-card-note { display: none; }
.signal-card.open .signal-card-expanded { display: block; }
.signal-card-toggle { text-align:center; margin-top:8px; font-size:11px; color:var(--text2); }
.signal-card-toggle .toggle-collapse { display: none; }
.signal-card.open .signal-card-toggle .toggle-expand { display: none; }
.signal-card.open .signal-card-toggle .toggle-collapse { display: inline; }

/* =========== Action To-Do Checkboxes =========== */
.todo-check-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 8px; margin-bottom: 6px;
  transition: all 0.15s; border: 1px solid transparent;
}
.todo-check-item:hover { background: var(--surface2); }
.todo-check-item.done { opacity: 0.45; }
.todo-check-item.done .todo-check-text { text-decoration: line-through; }
.todo-check-input {
  width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0;
  accent-color: var(--accent);
}
.todo-check-text { font-size: 13px; line-height: 1.6; flex: 1; }
.todo-check-priority {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; flex-shrink: 0; margin-top: 3px;
}
.todo-check-priority.p-high { background: rgba(239,68,68,0.2); color: var(--red); }
.todo-check-priority.p-medium { background: rgba(234,179,8,0.2); color: var(--yellow); }
.todo-check-priority.p-low { background: rgba(34,197,94,0.2); color: var(--green); }
.todo-insight-ref {
  font-size: 11px; color: var(--accent2); cursor: pointer;
  background: none; border: none; margin-top: 4px; opacity: 0.7;
}
.todo-insight-ref:hover { opacity: 1; text-decoration: underline; }

/* =========== Today's Focus Widget =========== */
.todays-focus {
  position: fixed; bottom: 24px; right: 24px; z-index: 150;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 20px;
  width: 320px; max-width: calc(100vw - 48px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  transition: all 0.3s; transform: translateY(0);
}
.todays-focus.collapsed {
  width: auto; padding: 10px 16px; cursor: pointer;
}
.todays-focus.hidden { transform: translateY(calc(100% + 40px)); pointer-events: none; }
.todays-focus-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; font-size: 12px; font-weight: 700;
  color: var(--accent2); text-transform: uppercase; letter-spacing: 0.5px;
}
.todays-focus-close {
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 16px; line-height: 1;
}
.todays-focus-close:hover { color: var(--text); }
.todays-focus-item {
  font-size: 12px; line-height: 1.6; padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.todays-focus-item:last-child { border-bottom: none; }

/* =========== Settings Modal =========== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 400; display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px; width: 420px; max-width: 90vw;
}
.modal-box h3 { font-size: 16px; margin-bottom: 16px; }
.modal-box label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
.modal-box input[type="password"] {
  width: 100%; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 13px; margin-bottom: 12px;
}
.modal-box input[type="password"]:focus { border-color: var(--accent); outline: none; }
.modal-box .modal-warn {
  font-size: 11px; color: var(--yellow); margin-bottom: 12px;
  padding: 8px; background: rgba(234,179,8,0.08); border-radius: 6px;
}
.modal-box .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* =========== Primary Tabs =========== */
.primary-tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: var(--surface); border-radius: 10px; padding: 4px;
  width: fit-content; flex-wrap: wrap;
}
.primary-tab {
  padding: 8px 20px; border-radius: 8px; border: none;
  background: transparent; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all 0.15s; font-weight: 500;
}
.primary-tab.active { background: var(--accent); color: white; }
.primary-tab:hover:not(.active) { color: var(--text); }
.ptab-content { display: none; }
.ptab-content.active { display: block; }

/* Lovable-inspired visual upgrade layer */
:root, [data-theme="dark"] {
  --bg: #0b1320;
  --surface: #111c2d;
  --surface2: #172538;
  --surface3: #1e2d43;
  --border: rgba(150, 167, 194, 0.18);
  --text: #edf3ff;
  --text2: #96a7c2;
  --accent: #2388ff;
  --accent2: #7cb5ff;
  --green: #21a366;
  --red: #e45757;
  --yellow: #f5b73d;
  --orange: #f38b4a;
  --chart-grid: rgba(150, 167, 194, 0.15);
  --chart-text: #96a7c2;
  --hover-row: rgba(35, 136, 255, 0.06);
  --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.22);
  --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.18);
  --filter-active-bg: rgba(35, 136, 255, 0.16);
  --filter-active-border: rgba(124, 181, 255, 0.5);
  --filter-inactive-bg: rgba(255, 255, 255, 0.02);
  --rank-gold: #f5b73d;
  --rank-silver: #9aa7bd;
  --rank-bronze: #c47b4a;
}

[data-theme="light"] {
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --surface3: #e9eef7;
  --border: #d9e2ef;
  --text: #172033;
  --text2: #6b7c96;
  --accent: #3167e3;
  --accent2: #5a86ea;
  --green: #158a54;
  --red: #ef4f4f;
  --yellow: #d39a17;
  --orange: #d86d2a;
  --chart-grid: rgba(23, 32, 51, 0.08);
  --chart-text: #5f718d;
  --hover-row: rgba(25, 103, 210, 0.05);
  --shadow-soft: 0 6px 18px rgba(23, 32, 51, 0.06);
  --shadow-card: 0 2px 10px rgba(23, 32, 51, 0.04);
  --filter-active-bg: #3167e3;
  --filter-active-border: #3167e3;
  --filter-inactive-bg: #ffffff;
  --rank-gold: #bc8410;
  --rank-silver: #6e7b8f;
  --rank-bronze: #ad6533;
}

body {
  font-family: "IBM Plex Sans", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-variant-numeric: tabular-nums;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.header {
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(14px);
}

.header h1 {
  font-weight: 700;
  letter-spacing: -0.02em;
}

.toggle-group {
  border-radius: 999px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}

.toggle-group button {
  padding: 6px 13px;
  font-weight: 600;
}

.btn {
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow: 0 10px 20px rgba(35, 136, 255, 0.22);
}

.btn-primary:hover {
  filter: brightness(1.04);
  transform: translateY(-1px);
}

.btn-outline {
  background: var(--filter-inactive-bg);
  backdrop-filter: blur(8px);
}

.btn-outline:hover {
  border-color: var(--accent);
  color: var(--text);
  transform: translateY(-1px);
}

.btn-outline.active {
  border-color: var(--filter-active-border);
  color: var(--accent2);
  background: var(--filter-active-bg);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
}

.filters {
  gap: 12px;
}

.filter-level {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px 16px;
  box-shadow: none;
}

.filter-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.filter-label::before {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 999px;
  background: var(--surface2);
  color: var(--accent2);
  font-size: 11px;
  content: none;
}

.filter-row .btn-outline {
  min-height: 38px;
  padding: 8px 14px;
}

.filter-btn-inner {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.filter-btn-inner .ui-icon {
  width: 14px;
  height: 14px;
}

.kpi-card,
.chart-card,
.insight-card,
.status-table-wrap,
.exec-summary,
.country-card,
.main-insight-hero,
.main-actions-wrap,
.direction-card,
.today-focus {
  border-radius: 18px;
  box-shadow: var(--shadow-card);
}

.kpi-card {
  background: var(--surface);
  transition: background 0.2s, transform 0.2s, border-color 0.2s;
  border: 1px solid var(--border);
}

.kpi-card:hover,
.chart-card:hover {
  transform: translateY(-2px);
  border-color: var(--filter-active-border);
}

.kpi-card .kpi-label {
  font-size: 11px;
  letter-spacing: 0.08em;
  font-weight: 600;
}

.kpi-card .kpi-value {
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: -0.03em;
  font-family: "IBM Plex Sans", "Noto Sans KR", sans-serif;
}

.section-title {
  letter-spacing: -0.02em;
}

.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ui-icon {
  width: 18px;
  height: 18px;
  flex: 0 0 auto;
}

.chart-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
}

.section-tag .ui-icon {
  width: 14px;
  height: 14px;
}

.chart-title .ui-icon {
  width: 16px;
  height: 16px;
  color: var(--accent2);
}

.chart-empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 220px;
  padding: 16px;
  color: var(--text2);
  font-size: 12px;
  text-align: center;
}

.trend-icon {
  width: 14px;
  height: 14px;
}

.kpi-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.kpi-card-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 999px;
  background: var(--surface2);
  color: var(--text2);
}

.kpi-card-icon .ui-icon {
  width: 15px;
  height: 15px;
}

.kpi-change {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 800;
  letter-spacing: -0.01em;
}

.kpi-change .change-value {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.kpi-change .change-meta {
  color: var(--text2);
  font-weight: 700;
  margin-left: 2px;
}

.section-title-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(35, 136, 255, 0.18), rgba(124, 181, 255, 0.08));
  color: var(--accent2);
  font-size: 16px;
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(124, 181, 255, 0.12);
}

.section-title-icon .ui-icon {
  width: 18px;
  height: 18px;
}

.section-title-icon.snapshot {
  color: var(--orange);
  background: linear-gradient(135deg, rgba(243, 139, 74, 0.18), rgba(245, 183, 61, 0.08));
}

.section-title-icon.insights {
  color: var(--accent2);
}

.section-kicker {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text2);
  margin-bottom: 3px;
  font-weight: 700;
}

.status-pill {
  border-radius: 999px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.ranking-table td:first-child {
  width: 42px;
}

.ranking-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

.ranking-title::before {
  content: none;
}

.ranking-title .ui-icon {
  width: 16px;
  height: 16px;
}

.rank-badge {
  display: inline-flex;
  width: 24px;
  height: 24px;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: var(--surface2);
  color: var(--text2);
  font-size: 11px;
  font-weight: 700;

let currentLang = localStorage.getItem('lg_dash_lang') || 'en';
let currentTheme = localStorage.getItem('lg_dash_theme') || 'light';

function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en[key]) || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.title = t('title');
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lg_dash_lang', lang);
  document.documentElement.setAttribute('data-lang', lang);
  applyI18n();
  if (DATA) render();
  // Update toggle active state
  document.querySelectorAll('#langToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.val === lang);
  });
}

function setTheme(theme) {
  currentTheme = theme;
  localStorage.setItem('lg_dash_theme', theme);
  document.documentElement.setAttribute('data-theme', theme);
  // Re-render charts for new colors
  if (DATA) render();
  document.querySelectorAll('#themeToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.val === theme);
  });
}

function countryBadge(code) {

  return `<span class="country-badge"><span class="country-flag">${flag}</span>${suffix ? `<span class="country-badge-tag">${suffix}</span>` : ''}</span>`;

function countryLabel(code) {

}

    overview: '<rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M3 10h18"></path><path d="M9 20V10"></path>',
    acquisition: '<path d="M12 3v13"></path><path d="M7 11l5 5 5-5"></path><path d="M4 21h16"></path>',

function chartTitle(icon, label, suffix = '') {
  return `<span class="chart-title">${iconSvg(icon)}<span>${label}${suffix ? ` ${suffix}` : ''}</span></span>`;
}

function sectionTag(icon, label) {
  return `<span class="section-tag">${iconSvg(icon)}<span>${label}</span></span>`;
}

function metricIconName(label) {
  const key = String(label || '').toLowerCase();
  if (key.includes('session')) return 'sessions';
  if (key.includes('duration') || key.includes('체류')) return 'duration';
  if (key.includes('conversion') || key.includes('전환')) return 'conversion';
  if (key.includes('click')) return 'behavior';
  if (key.includes('organic') || key.includes('external') || key.includes('internal')) return 'traffic';
  if (key.includes('page')) return 'overview';
  return 'overview';
}

function trendMarkup(change) {
  if (change == null) return '';
  const cls = change > 0 ? 'up' : change < 0 ? 'down' : 'neutral';
  const icon = change > 0 ? iconSvg('good', 'trend-icon') : change < 0 ? iconSvg('alert', 'trend-icon') : iconSvg('watch', 'trend-icon');
  const text = `${change > 0 ? '+' : ''}${change.toFixed(1)}%`;
  return `<div class="kpi-change ${cls}"><span class="change-value">${icon}${text}</span><span class="change-meta">MoM</span></div>`;
}

function kpiStatusConfig(change) {
  if (change == null) return {
    cls: 'neutral',
    label: currentLang === 'ko' ? '안정' : 'Stable',
    note: currentLang === 'ko' ? '추이 확인 필요' : 'Trend under review'
  };
  if (change <= -5) return {
    cls: 'down',
    label: currentLang === 'ko' ? '주의' : 'Watch',
    note: currentLang === 'ko' ? '전월 대비 하락 추세' : 'Downward month-over-month trend'
  };
  if (change >= 5) return {
    cls: 'up',
    label: currentLang === 'ko' ? '양호' : 'Strong',
    note: currentLang === 'ko' ? '전월 대비 개선 추세' : 'Positive month-over-month momentum'
  };
  return {
    cls: 'neutral',
    label: currentLang === 'ko' ? '안정' : 'Stable',
    note: currentLang === 'ko' ? '큰 변동 없는 상태' : 'Relatively stable performance'
  };
}

function averageNumbers(values) {
  const valid = (values || []).filter(v => v != null && !Number.isNaN(v));
  return valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : null;
}

function percentChange(current, previous) {
  if (current == null || previous == null || previous === 0) return null;
  return ((current - previous) / Math.abs(previous)) * 100;
}

function getSheetSession(metrics, month, category) {
  return getMetricValue(metrics, month, 'lineup', 'session')
    ?? getMetricValue(metrics, month, String(category || '').toLowerCase(), 'lineup', 'session')
    ?? getMetricValue(metrics, month, 'session');
}

function getSheetSummary(item, latest, prev) {
  const metrics = item.metrics_2026 || {};
  return {
    content_type: item.content_type,
    sessions: getSheetSession(metrics, latest, item.category),
    sessions_prev: prev ? getSheetSession(metrics, prev, item.category) : null,
    page_views: getMetricValue(metrics, latest, 'page_view') ?? getMetricValue(metrics, latest, 'line_up') ?? getMetricValue(metrics, latest, 'lineup'),
    page_views_prev: prev ? (getMetricValue(metrics, prev, 'page_view') ?? getMetricValue(metrics, prev, 'line_up') ?? getMetricValue(metrics, prev, 'lineup')) : null,
    event_clicks: getMetricValue(metrics, latest, 'event_click') ?? getMetricValue(metrics, latest, 'guide_event_click'),
    event_clicks_prev: prev ? (getMetricValue(metrics, prev, 'event_click') ?? getMetricValue(metrics, prev, 'guide_event_click')) : null,
    duration: getMetricValue(metrics, latest, 'avg_session_duration') ?? getMetricValue(metrics, latest, 'avg_session_duration_sec'),
    plp_conv: getMetricValue(metrics, latest, 'plp_conversion'),
    plp_conv_prev: prev ? getMetricValue(metrics, prev, 'plp_conversion') : null,
    purchase_conv: getMetricValue(metrics, latest, 'purchase_conversion'),
    purchase_conv_prev: prev ? getMetricValue(metrics, prev, 'purchase_conversion') : null,
    purchase_intent_conv: getMetricValue(metrics, latest, 'purchase_intent_conversion') ?? getMetricValue(metrics, latest, 'purchase_intent'),
    purchase_intent_conv_prev: prev ? (getMetricValue(metrics, prev, 'purchase_intent_conversion') ?? getMetricValue(metrics, prev, 'purchase_intent')) : null,
    purchase_count: getMetricValue(metrics, latest, 'purchase'),
    organic: getMetricValue(metrics, latest, 'organic'),
    external: getMetricValue(metrics, latest, 'external_entrance') ?? getMetricValue(metrics, latest, 'external'),
    internal: getMetricValue(metrics, latest, 'internal'),
    engagement_rate: getMetricValue(metrics, latest, 'engagement_rate') ?? getMetricValue(metrics, latest, 'engagemet_rate'),
  };
}

function getPageLinksForSheet(item) {
  const pages = DATA?.pages || [];
  const localizedCountry = countryName(item.country);
  const countryCode = item.country;
  const category = String(item.category || '').toLowerCase();
  const isFeature = item.content_type === 'feature_library';
  return pages.filter(page => {
    const type = String(page.type || '').toLowerCase();
    const pageCountry = String(page.country || '');
    const pageCategory = String(page.category || '').toLowerCase();
    const countryMatch = pageCountry.includes(countryCode) || pageCountry.includes(localizedCountry);
    if (!countryMatch) return false;
    const typeMatch = isFeature ? (type.includes('feature') || type.includes('spec')) : type.includes('lineup');
    if (!typeMatch) return false;
    if (!pageCategory) return true;
    if (category === 'tv' && pageCategory.includes('tv')) return true;
    if (category === 'monitor' && (pageCategory.includes('monitor') || pageCategory.includes('모니터'))) return true;
    return pageCategory.includes(category);
  });
}

function computeDashboardSummary(sheets, latest, prev) {
  const summaries = {};
  sheets.forEach(([key, item]) => {
    summaries[key] = getSheetSummary(item, latest, prev);
  });

  const countryReports = {};
  sheets.forEach(([key, item]) => {
    const summary = summaries[key];
    const report = countryReports[item.country] ||= {
      total_sessions: 0,
      session_change_pct: null,
      total_clicks: 0,
      avg_plp_conv: null,
      avg_purchase_conv: null,
      total_purchases: 0,
      avg_duration: null,
      status: 'stable',
      links: [],
      analyst_notes: [],
      per_product: {},
    };
    report.total_sessions += summary.sessions || 0;
    report.total_clicks += summary.event_clicks || 0;
    report.total_purchases += summary.purchase_count || 0;
    report.avg_plp_conv = averageNumbers([report.avg_plp_conv, summary.plp_conv]);
    report.avg_purchase_conv = averageNumbers([report.avg_purchase_conv, summary.purchase_conv]);
    report.avg_duration = averageNumbers([report.avg_duration, summary.duration]);
    report.per_product[item.category] = {
      sessions: summary.sessions,
      page_views: summary.page_views,
      plp_conv: summary.plp_conv,
      purchase_conv: summary.purchase_conv,
      duration: summary.duration,
      clicks: summary.event_clicks,
      engagement_rate: summary.engagement_rate,
    };
    report.links.push(...getPageLinksForSheet(item));
    if (item.insights && item.insights.length) {
      report.analyst_notes.push({ page: item.category, notes: item.insights });
    }
  });

  Object.entries(countryReports).forEach(([country, report]) => {
    const previousSessions = sheets.reduce((sum, [key, item]) => item.country === country ? sum + (summaries[key].sessions_prev || 0) : sum, 0);
    report.session_change_pct = percentChange(report.total_sessions, previousSessions);
    const prevPlp = averageNumbers(
      sheets.filter(([, item]) => item.country === country).map(([key]) => summaries[key].plp_conv_prev)
    );
    const plpChange = percentChange(report.avg_plp_conv, prevPlp);
    const sessionChange = report.session_change_pct ?? 0;
    const safePlpChange = plpChange ?? 0;
    if (sessionChange >= 5 && safePlpChange > -10) report.status = 'growing';
    else if (sessionChange <= -10 || safePlpChange <= -10) report.status = 'declining';
    else report.status = 'stable';
    report.links = Array.from(new Map(report.links.filter(link => link.link).map(link => [link.link, link])).values());
  });

  const categoryReports = {};
  sheets.forEach(([key, item]) => {
    const summary = summaries[key];
    const entry = categoryReports[item.category] ||= {
      total_sessions: 0,
      avg_plp_conv: null,
      countries_count: 0,
      ranked_sessions: [],
      ranked_plp: [],
      ranked_duration: [],
    };
    entry.total_sessions += summary.sessions || 0;
    entry.avg_plp_conv = averageNumbers([entry.avg_plp_conv, summary.plp_conv]);
    entry.ranked_sessions.push([item.country, summary.sessions || 0]);
    entry.ranked_plp.push([item.country, summary.plp_conv || 0]);
    entry.ranked_duration.push([item.country, summary.duration || 0]);
  });

  Object.values(categoryReports).forEach(entry => {
    entry.countries_count = new Set(entry.ranked_sessions.map(([country]) => country.startsWith('CA-') ? 'CA' : country)).size;
    entry.ranked_sessions.sort((a, b) => b[1] - a[1]);
    entry.ranked_plp.sort((a, b) => b[1] - a[1]);
    entry.ranked_duration.sort((a, b) => b[1] - a[1]);
  });

  const rankedPlp = sheets
    .map(([key, item]) => [`${item.category} ${item.country}`, summaries[key].plp_conv])
    .filter(([, value]) => value != null)
    .sort((a, b) => b[1] - a[1]);

  const totalSessions = sheets.reduce((sum, [key]) => sum + (summaries[key].sessions || 0), 0);
  const totalSessionsPrev = sheets.reduce((sum, [key]) => sum + (summaries[key].sessions_prev || 0), 0);

  return {
    executive: {
      latest_month: latest,
      prev_month: prev,
      total_sessions: totalSessions,
      session_change_pct: percentChange(totalSessions, totalSessionsPrev),
      total_clicks: sheets.reduce((sum, [key]) => sum + (summaries[key].event_clicks || 0), 0),
      prev_total_clicks: sheets.reduce((sum, [key]) => sum + (summaries[key].event_clicks_prev || 0), 0),
      avg_plp_conv: averageNumbers(sheets.map(([key]) => summaries[key].plp_conv)),
      prev_avg_plp_conv: averageNumbers(sheets.map(([key]) => summaries[key].plp_conv_prev)),
      avg_purchase_conv: averageNumbers(sheets.map(([key]) => summaries[key].purchase_conv)),
      avg_purchase_intent_conv: averageNumbers(sheets.map(([key]) => summaries[key].purchase_intent_conv)),
      prev_avg_purchase_intent_conv: averageNumbers(sheets.map(([key]) => summaries[key].purchase_intent_conv_prev)),
      total_pages_tracked: sheets.length,
      prev_total_pages_tracked: sheets.length,
      top_plp_pages: rankedPlp.slice(0, 3),
      low_plp_pages: rankedPlp.slice(-3),
    },
    country_reports: countryReports,
    category_reports: categoryReports,
    sheet_summaries: summaries,
  };
}

function getActiveSummary() {
  const latest = getLatestMonth();
  const prev = getPrevMonth();
  const sheets = getFilteredSheets();
  const summary = computeDashboardSummary(sheets, latest, prev);
  const perContentType = {};
  ['lineup', 'feature_library'].forEach(ct => {
    const scoped = sheets.filter(([, item]) => item.content_type === ct);
    if (scoped.length) perContentType[ct] = computeDashboardSummary(scoped, latest, prev);
  });
  summary.per_content_type = perContentType;
  return summary;
}

function buildMonthlyInsightItems() {
  const latest = getLatestMonth();
  const prev = getPrevMonth();
  const sheets = getFilteredSheets();
  const summary = getActiveSummary();
  const items = [];

  const topPlp = summary.executive?.top_plp_pages?.[0];
  if (topPlp) {
    items.push({
      type: 'success',
      priority: 'high',
      page: topPlp[0],
      metric: 'Conversion Efficiency',
      message: `${topPlp[0]} ${currentLang === 'ko' ? '페이지가' : 'leads'} ${((topPlp[1] || 0) * 100).toFixed(1)}% ${currentLang === 'ko' ? 'PLP 전환율을 기록했습니다.' : 'PLP conversion.'}`,
    });
  }

  const countryMovers = Object.entries(summary.country_reports || {}).sort((a, b) => (a[1].session_change_pct || -999) - (b[1].session_change_pct || -999));
  const weakestCountry = countryMovers[0];
  if (weakestCountry && (weakestCountry[1].session_change_pct || 0) <= -10) {
    items.push({
      type: 'warning',
      priority: 'high',
      page: weakestCountry[0],
      metric: 'Sessions',
      message: `${countryName(weakestCountry[0])} ${currentLang === 'ko' ? '세션이 전월 대비' : 'sessions changed'} ${(weakestCountry[1].session_change_pct || 0).toFixed(1)}% ${currentLang === 'ko' ? '변화했습니다. 유입 변화와 콘텐츠 상태를 확인하세요.' : 'vs previous month. Review traffic source and content freshness.'}`,
    });
  }

  const lowPlp = summary.executive?.low_plp_pages?.[0];
  if (lowPlp) {
    items.push({
      type: 'watch',
      priority: 'medium',
      page: lowPlp[0],
      metric: 'PLP',
      message: `${lowPlp[0]} ${currentLang === 'ko' ? '페이지의 PLP 전환율은' : 'shows'} ${((lowPlp[1] || 0) * 100).toFixed(1)}% ${currentLang === 'ko' ? '수준입니다. CTA와 비교 진입 구조를 점검하세요.' : 'PLP conversion. Review CTA and comparison-entry structure.'}`,
    });
  }

  const organicRisk = sheets.map(([key, data]) => {
    const metrics = data.metrics_2026 || {};
    const organic = getMetricValue(metrics, latest, 'organic') || 0;
    const external = (getMetricValue(metrics, latest, 'external_entrance') ?? getMetricValue(metrics, latest, 'external')) || 0;
    return { data, ratio: external > 0 ? organic / external : null };
  }).filter(item => item.ratio != null && item.ratio < 0.3).sort((a, b) => a.ratio - b.ratio)[0];
  if (organicRisk) {
    items.push({
      type: 'warning',
      priority: 'medium',
      page: `${organicRisk.data.category} ${organicRisk.data.country}`,
      metric: 'SEO',
      message: `${organicRisk.data.category} ${countryName(organicRisk.data.country)} ${currentLang === 'ko' ? '페이지는 오가닉 유입 비중이 낮습니다. 외부 유입 의존도를 줄일 SEO 개선이 필요합니다.' : 'has a low organic share. SEO work is needed to reduce reliance on non-organic traffic.'}`,
    });
  }

  if (prev) {
    const improving = sheets.map(([key, data]) => {
      const metrics = data.metrics_2026 || {};
      const current = getSheetSession(metrics, latest, data.category);
      const previous = getSheetSession(metrics, prev, data.category);
      return { data, change: percentChange(current, previous) };
    }).filter(item => item.change != null).sort((a, b) => b.change - a.change)[0];
    if (improving && improving.change > 0) {
      items.push({
        type: 'success',
        priority: 'medium',
        page: `${improving.data.category} ${improving.data.country}`,
        metric: 'Sessions',
        message: `${improving.data.category} ${countryName(improving.data.country)} ${currentLang === 'ko' ? '페이지는 전월 대비 세션이 가장 크게 증가했습니다.' : 'shows the strongest MoM session growth.'} ${improving.change.toFixed(1)}%.`,
      });
    }
  }
  return items.slice(0, 6);
}

function switchToPrimaryTab(tabName) {
  document.querySelectorAll('#primaryTabs .primary-tab').forEach(t => t.classList.remove('active'));

  if (btn) btn.classList.add('active');

  if (panel) { panel.classList.add('active'); panel.style.display = 'block'; }
  activePrimaryTab = tabName;
  if (DATA) render();
}

function scrollToDetail(dtab) {
  // Switch detail tab
  if (dtab) {
    document.querySelectorAll('#detailTabs .detail-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.detail-content').forEach(c => c.classList.remove('active'));
    const btn = document.querySelector(`#detailTabs .detail-tab[data-dtab="${dtab}"]`);
    if (btn) btn.classList.add('active');
    const panel = document.getElementById('dtab-' + dtab);
    if (panel) panel.classList.add('active');
  }
  // Scroll to detail section
  document.getElementById('detailDataSection').scrollIntoView({ behavior: 'smooth' });
}

// ============================================================
// Data Loading
// ============================================================
async function loadData() {
  try {
    // Try API first (local server), fallback to static file (GitHub Pages)
    let resp;
    try {
      resp = await fetch('/api/data');
      if (!resp.ok) throw new Error();
    } catch {
      resp = await fetch('./data/data.json');
    }
    DATA = await resp.json();
    if (!getMonths().includes(selectedMonth)) selectedMonth = 'LATEST';
    try {
      const csvResp = await fetch('./data/page-links.csv', { cache: 'no-store' });
      if (csvResp.ok) {
        const csvText = await csvResp.text();
        const rows = parsePageLinksCsv(csvText);
        if (rows.length) DATA.pages = rows;
      }
    } catch {}
    render();
  } catch (e) {
    showToast(t('load_fail'));
  }
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.querySelector('[data-i18n]').textContent = t('refreshing');
  try {
    // Try server-side refresh (local), fallback to static reload (deployed)
    let resp;
    try {
      resp = await fetch('/api/refresh');
      if (!resp.ok) throw new Error();
      const result = await resp.json();
      if (result.status === 'success') {
        showToast(t('refresh_success'));
        await loadData();
        return;
      } else {
        showToast(t('refresh_fail') + ': ' + result.message);
        return;
      }
    } catch {
      // Static mode: just re-fetch data.json
      await loadData();
      showToast(t('refresh_success'));
    }
  } catch (e) {
    showToast(t('refresh_fail') + ': ' + e.message);
  } finally {
    btn.disabled = false;
    btn.querySelector('[data-i18n]').textContent = t('refresh');
  }
}

function getFilteredSheets(options = {}) {
  const { ignoreCountry = false } = options;
  return Object.entries(DATA.monthly_data).filter(([key, val]) => {

function getAvailablePeriods() {
  return DATA?.meta?.periods_available || (DATA?.meta?.months_available || []).map(month => `2026-${month}`);
}
function getMonths() { return getAvailablePeriods(); }
function getPeriodParts(periodKey) {
  if (!periodKey) return { year: null, month: null };
  const [year, month] = String(periodKey).split('-', 2);
  return { year, month };
}
function getPeriodMonth(periodKey) {
  return getPeriodParts(periodKey).month;
}
function getPeriodYear(periodKey) {
  const year = getPeriodParts(periodKey).year;
  return year ? Number(year) : null;
}
function formatPeriodLabel(periodKey, localeMode = 'full') {
  const { year, month } = getPeriodParts(periodKey);
  if (!year || !month) return '—';
  if (currentLang === 'ko') {
    const monthNo = MONTH_TO_NUMBER[month] || month;
    if (localeMode === 'short') return `${String(year).slice(-2)}.${monthNo}`;
    if (localeMode === 'compact') return `${year}.${monthNo}`;
    return `${year}, ${month}`;
  }
  if (localeMode === 'short') return `${String(year).slice(-2)} ${month}`;
  if (localeMode === 'compact') return `${month} ${year}`;
  return `${year}, ${month}`;
}
function getSelectedMonthYearLabel() {
  return formatPeriodLabel(getLatestMonth(), 'compact');
}
function getLatestMonth() {
  const periods = getAvailablePeriods();
  if (!periods.length) return null;
  if (selectedMonth !== 'LATEST' && periods.includes(selectedMonth)) return selectedMonth;
  return periods[periods.length - 1];
}
function getPrevMonth() {
  const months = getAvailablePeriods();
  const current = getLatestMonth();
  const idx = months.indexOf(current);
  return idx > 0 ? months[idx - 1] : null;
}
function getPeriodLabels(periods, localeMode = 'short') {
  return periods.map(period => formatPeriodLabel(period, localeMode));
}

function findMetric(metrics, ...keywords) {
  for (const [key, val] of Object.entries(metrics)) {
    const lk = key.toLowerCase();
    if (keywords.every(kw => lk.includes(kw.toLowerCase()))) return val;
  }
  return null;
}

function getMetricValue(metrics, month, ...keywords) {
  let m = findMetric(metrics, ...keywords);
  // Fallback: try spec_library variants if lineup keywords fail
  if (!m) {
    const alt = keywords.map(kw => {
      if (kw === 'lineup') return 'spec_library';
      if (kw === 'tv_lineup') return 'tv_spec_library';
      if (kw === 'monitor_lineup') return 'monitor_spec_library';
      if (kw === 'line_up') return 'spec_library';
      if (kw === 'line_up_guide') return 'spec_library';
      if (kw === 'guide_event_click') return 'library_event_click';
      return kw;
    });
    if (alt.join() !== keywords.join()) m = findMetric(metrics, ...alt);
  }
  if (!m || !m.monthly || m.monthly[month] == null) return null;
  return m.monthly[month];
}

function formatNum(n, decimals = 0) {
  if (n == null) return '—';
  if (Math.abs(n) < 1 && n !== 0) return (n * 100).toFixed(1) + '%';
  return n.toLocaleString(currentLang === 'ko' ? 'ko-KR' : 'en-US', { maximumFractionDigits: decimals });
}

function formatDurationSeconds(seconds) {
  if (seconds == null) return '—';
  return `${Math.floor(seconds)}s`;
}

function getTopCategoryName(perProduct = {}) {
  const entries = Object.entries(perProduct);
  if (!entries.length) return '—';
  return entries.sort((a, b) => (b[1]?.sessions || 0) - (a[1]?.sessions || 0))[0][0];
}

function getCategoryLinks(links = [], category) {
  return (links || []).filter(link => {
    const linkCategory = String(link.category || '').toUpperCase();
    return link.link && (!category || linkCategory === String(category).toUpperCase());
  });
}

function getContentScopeLabel(lineupLabel, featureLabel, allLabel = null) {
  if (selectedContentType === 'lineup') return lineupLabel;
  if (selectedContentType === 'feature_library') return featureLabel;
  return allLabel || lineupLabel.replace(/\s*\(.*?\)\s*$/, '');
}

function getRawDataSessionsLabel() {

function getRawDataPageViewsLabel() {

}

function getSessionSeries(metrics, periods, category) {

function setChartEmptyState(canvasId, message) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !canvas.parentElement) return;
  if (charts[canvasId]) {
    charts[canvasId].destroy();
    delete charts[canvasId];
  }
  canvas.style.display = 'none';
  let empty = canvas.parentElement.querySelector('.chart-empty-state');
  if (!empty) {
    empty = document.createElement('div');
    empty.className = 'chart-empty-state';
    canvas.parentElement.appendChild(empty);
  }
  empty.textContent = message;
}

function clearChartEmptyState(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !canvas.parentElement) return;
  canvas.style.display = '';
  const empty = canvas.parentElement.querySelector('.chart-empty-state');
  if (empty) empty.remove();
}

function calcChange(curr, prev) {
  if (prev == null || prev === 0 || curr == null) return null;
  return ((curr - prev) / Math.abs(prev)) * 100;
}

function getChartColors() {
  const style = getComputedStyle(document.documentElement);
  return {
    grid: style.getPropertyValue('--chart-grid').trim() || 'rgba(42,42,58,0.5)',
    text: style.getPropertyValue('--chart-text').trim() || '#8888a0',
  };
}

function renderGlobalMonthPicker() {
  const el = document.getElementById('globalMonthPicker');
  if (!el) return;
  const periods = getMonths();
  if (!periods.length) {
    el.innerHTML = '';
    return;
  }
  const current = getLatestMonth();
  el.innerHTML = `
    <button class="month-picker-trigger" type="button" aria-expanded="false" onclick="toggleMonthPicker()">
      <span class="month-trigger-main">
        ${iconSvg('overview')}

      ${periods.map(period => `
        <button class="month-picker-option ${current === period ? 'active' : ''}" type="button" onclick="selectGlobalMonth('${period}')">
          <span>${formatPeriodLabel(period, 'compact')}</span>
          ${current === period ? iconSvg('good', 'ui-icon tiny') : ''}

function toggleMonthPicker(forceOpen) {
  const el = document.getElementById('globalMonthPicker');
  if (!el) return;
  const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !el.classList.contains('open');
  el.classList.toggle('open', shouldOpen);
  const trigger = el.querySelector('.month-picker-trigger');
  if (trigger) trigger.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
}

function selectGlobalMonth(month) {
  selectedMonth = month;
  toggleMonthPicker(false);
  render();

  if (selectedContentType === 'ALL' && orderedContentTypes.length > 1) {

  }

  let plpInsight = '';
  if (selectedContentType !== 'ALL' || orderedContentTypes.length <= 1) {
    const topPlp = (ex.top_plp_pages || []).slice(0, 3);
    const lowPlp = (ex.low_plp_pages || []).slice(0, 3);
    if (topPlp.length || lowPlp.length) {
      plpInsight = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;">
        <div style="background:var(--surface2);border-radius:8px;padding:12px;cursor:pointer;" onclick="scrollToDetail('overview')">
          <div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px;">${t('exec_top_plp')}</div>
          ${topPlp.length ? buildPlpList(topPlp, 'var(--green)', 'good') : `<div style="font-size:12px;color:var(--text2);">-</div>`}
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:12px;cursor:pointer;" onclick="scrollToDetail('overview')">
          <div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:6px;">${t('exec_low_plp')}</div>
          ${lowPlp.length ? buildPlpList(lowPlp, 'var(--red)', 'alert') : `<div style="font-size:12px;color:var(--text2);">-</div>`}
        </div>
      </div>`;
    }
  }

  // Country status mini cards
  const sortedCountries = (() => {
    const ranked = Object.entries(reports).sort((a, b) => (b[1].total_sessions || 0) - (a[1].total_sessions || 0));
    const grouped = [];
    const used = new Set();
    ranked.forEach(([code, report]) => {
      if (used.has(code)) return;
      if (code === 'CA-EN' || code === 'CA-FR') {
        const variants = ['CA-EN', 'CA-FR']
          .filter(variant => reports[variant])
          .map(variant => [variant, reports[variant]]);
        variants.forEach(([variant]) => used.add(variant));
        grouped.push(...variants);
        return;
      }
      used.add(code);
      grouped.push([code, report]);
    });
    return grouped;
  })();
  let countriesHtml = '';
  if (sortedCountries.length > 0) {
      countriesHtml = `<div style="margin-top:14px;"><div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;">${t('main_country_status')}</div><div class="country-status-grid">`;
    sortedCountries.forEach(([code, r]) => {
      const statusColor = r.status === 'growing' ? 'var(--green)' : r.status === 'declining' ? 'var(--red)' : 'var(--accent2)';
      const statusLabel = t(r.status) || r.status;
      const momS = (r.session_change_pct || 0) >= 0 ? '+' : '';
      countriesHtml += `<div class="country-status-mini">
        <div class="csm-name" style="display:flex;align-items:center;gap:6px;">${countryBadge(code)}${countryName(code)}</div>
        <div class="csm-stat"><span style="color:${statusColor};font-weight:600;">${statusLabel}</span> · ${formatNum(r.total_sessions || 0)} sess · ${momS}${(r.session_change_pct || 0).toFixed(0)}%</div>
      </div>`;
    });
    countriesHtml += '</div></div>';
  }

  const buildAiSummaryCard = (ct) => {
    const block = aiData[ct];
    if (!block || !block.records || !block.records.length) return '';
    const selectedPeriod = getLatestMonth();
    const selectedYear = getPeriodYear(selectedPeriod);
    const selectedMonth = getPeriodMonth(selectedPeriod);
    const hasSelectedPeriod = block.records.some(record => record.month === selectedMonth && record.year === selectedYear);
    const records = hasSelectedPeriod
      ? block.records.filter(record => record.month === selectedMonth && record.year === selectedYear)
      : block.records.filter(record => record.month === block.latest_month);
    if (!records.length) return '';
    const aiLabel = hasSelectedPeriod
      ? formatPeriodLabel(selectedPeriod, 'compact')
      : formatPeriodLabel(`${records[0].year}-${records[0].month}`, 'compact');
    const sessions = records.filter(record => record.metric === 'session').reduce((sum, record) => sum + (record.value || 0), 0);
    const pageViews = records.filter(record => record.metric === 'page_view').reduce((sum, record) => sum + (record.value || 0), 0);
    const avgDuration = averageNumbers(records.filter(record => record.metric === 'avg_session_duration_sec').map(record => record.value));
    const plpConv = averageNumbers(records.filter(record => record.metric === 'plp_conversion').map(record => record.value));
    const titleColor = ct === 'lineup' ? 'var(--accent2)' : 'var(--orange)';
    const borderColor = ct === 'lineup' ? 'var(--accent)' : 'var(--orange)';
    return `<div style="background:var(--surface2);border-radius:12px;padding:14px;border-left:3px solid ${borderColor};">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:${titleColor};">${iconSvg(ct === 'lineup' ? 'lineup' : 'feature')}${t('ctype_' + ct)}</div>
        <span style="font-size:11px;color:var(--text2);">${aiLabel}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;">${iconSvg('sessions','ui-icon tiny')}${t('ai_sessions')}</div>
          <div style="font-size:22px;font-weight:700;margin-top:4px;">${formatNum(sessions)}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;">${iconSvg('overview','ui-icon tiny')}${t('ai_page_views')}</div>
          <div style="font-size:22px;font-weight:700;margin-top:4px;">${formatNum(pageViews)}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;">${iconSvg('duration','ui-icon tiny')}${t('ai_avg_duration')}</div>
          <div style="font-size:22px;font-weight:700;margin-top:4px;">${formatDurationSeconds(avgDuration)}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;">
          <div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;">${iconSvg('conversion','ui-icon tiny')}${t('ai_plp_conv')}</div>
          <div style="font-size:22px;font-weight:700;margin-top:4px;">${plpConv != null ? `${(plpConv * 100).toFixed(1)}%` : '-'}</div>
        </div>
      </div>
    </div>`;
  };
  let aiSummaryHtml = '';
  if (selectedContentType === 'ALL') {
    const aiCards = ['lineup', 'feature_library'].map(buildAiSummaryCard).filter(Boolean).join('');
    if (aiCards) {
      aiSummaryHtml = `<div style="margin-top:14px;">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px;">${iconSvg('traffic')}${t('ai_section_title')}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px;">${t('ai_section_subtitle')}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;">${aiCards}</div>
      </div>`;
    }
  } else {
    const aiCard = buildAiSummaryCard(selectedContentType);
    if (aiCard) {
      aiSummaryHtml = `<div style="margin-top:14px;">
        <div style="font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px;margin-bottom:10px;">${iconSvg('traffic')}${t('ai_section_title')}</div>
        ${aiCard}
      </div>`;
    }
  }

  document.getElementById('mainInsightsSummary').innerHTML = `
    <div class="main-insight-hero">
      <div class="section-head hero-head">
        <span class="section-title-icon insights">${iconSvg('insights')}</span>
        <div style="flex:1;">
          <div class="section-kicker">${t('current_month_status')}</div>
          <h2>${insightTitlePrefix}${t('main_insight_title')} — ${formatPeriodLabel(ex.latest_month, 'compact')}
            <span class="scroll-to-detail" onclick="scrollToDetail('overview')" style="margin-left:12px;font-size:12px;font-weight:400;">${t('detail_data_title')} ↓</span>
          </h2>
        </div>
      </div>
      <div class="main-insight-kpis">
        ${buildMainInsightKpi(formatNum(ex.total_sessions || 0), t('exec_sessions'), ex.session_change_pct, "scrollToDetail('overview')")}
        ${buildMainInsightKpi(formatNum(ex.total_clicks || 0), t('exec_clicks'), calcChange(ex.total_clicks, ex.prev_total_clicks), "scrollToDetail('overview')")}
        ${buildMainInsightKpi(`${((ex.avg_plp_conv || 0) * 100).toFixed(1)}%`, t('exec_plp'), calcChange(ex.avg_plp_conv, ex.prev_avg_plp_conv), "scrollToDetail('conversion')")}
        ${buildMainInsightKpi(`${((ex.avg_purchase_intent_conv || 0) * 100).toFixed(2)}%`, t('exec_purchase'), calcChange(ex.avg_purchase_intent_conv, ex.prev_avg_purchase_intent_conv), "scrollToDetail('conversion')")}
        ${buildMainInsightKpi(`${ex.total_pages_tracked || 0}`, t('exec_pages'), null)}
      </div>
      ${ctypeCompare}
      ${plpInsight}
      ${aiSummaryHtml}
      ${countriesHtml}
    </div>`;
}
